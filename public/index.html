<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>SuperInvestors — 13F Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080a0d;
        --surface: #0e1117;
        --surface2: #141820;
        --surface3: #1a2030;
        --border: #1e2535;
        --border2: #263045;
        --text: #e8edf5;
        --text2: #8899b4;
        --text3: #3d4f6b;
        --accent: #3b82f6;
        --accent2: #60a5fa;
        --buy: #10d98a;
        --sell: #f43f5e;
        --new: #a78bfa;
        --unchanged: #475569;
        --display: "Syne", sans-serif;
        --body: "DM Sans", sans-serif;
        --mono: "DM Mono", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        height: 56px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        position: sticky;
        top: 0;
        background: rgba(8, 10, 13, 0.92);
        backdrop-filter: blur(16px);
        z-index: 200;
      }
      .logo {
        font-family: var(--display);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-mark {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--accent), #818cf8);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 800;
        color: white;
      }
      .header-badge {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.06em;
        padding: 3px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }

      .app {
        display: grid;
        grid-template-columns: 280px 1fr;
        height: calc(100vh - 56px);
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-top {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .sidebar-label {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 10px;
      }
      .search-wrap {
        position: relative;
      }
      .search {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 8px 12px 8px 32px;
        color: var(--text);
        font-family: var(--body);
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }
      .search:focus {
        border-color: var(--accent);
      }
      .search::placeholder {
        color: var(--text3);
      }
      .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        font-size: 13px;
        pointer-events: none;
      }

      .investor-list {
        overflow-y: auto;
        flex: 1;
      }
      .investor-list::-webkit-scrollbar {
        width: 3px;
      }
      .investor-list::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }

      .inv-item {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.12s;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
      }
      .inv-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .inv-item:hover {
        background: rgba(59, 130, 246, 0.04);
      }
      .inv-item:hover::before {
        opacity: 0.5;
      }
      .inv-item.active {
        background: rgba(59, 130, 246, 0.08);
      }
      .inv-item.active::before {
        opacity: 1;
      }
      .inv-avatar {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--surface3), var(--border2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-size: 13px;
        font-weight: 700;
        color: var(--text2);
        flex-shrink: 0;
      }
      .inv-info {
        flex: 1;
        min-width: 0;
      }
      .inv-name {
        font-family: var(--display);
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .inv-meta {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
        font-family: var(--mono);
      }
      .style-pill {
        font-family: var(--mono);
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--surface3);
        color: var(--text3);
        letter-spacing: 0.04em;
        flex-shrink: 0;
      }

      .main {
        overflow-y: auto;
        background: var(--bg);
      }
      .main::-webkit-scrollbar {
        width: 3px;
      }
      .main::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }

      .empty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--text3);
      }
      .empty-icon {
        font-size: 40px;
        opacity: 0.2;
      }
      .empty-text {
        font-family: var(--mono);
        font-size: 12px;
      }

      .loading {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: var(--text3);
        font-family: var(--mono);
        font-size: 11px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-box {
        margin: 32px;
        background: rgba(244, 63, 94, 0.08);
        border: 1px solid rgba(244, 63, 94, 0.2);
        border-radius: 10px;
        padding: 20px 24px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--sell);
        line-height: 1.7;
      }

      .inv-header {
        padding: 24px 32px 0;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .inv-header-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 16px;
        gap: 16px;
      }
      .inv-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .inv-big-avatar {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), #818cf8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-size: 18px;
        font-weight: 800;
        color: white;
        flex-shrink: 0;
      }
      .inv-header-name {
        font-family: var(--display);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
        line-height: 1.1;
      }
      .inv-header-sub {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .inv-header-firm {
        font-size: 13px;
        color: var(--text2);
      }
      .inv-header-right {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .sec-btn {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 5px 10px;
        text-decoration: none;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .sec-btn:hover {
        color: var(--accent2);
        border-color: var(--accent);
      }

      .kpi-strip {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border-top: 1px solid var(--border);
      }
      .kpi-item {
        padding: 14px 16px;
        border-right: 1px solid var(--border);
      }
      .kpi-item:last-child {
        border-right: none;
      }
      .kpi-label {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 5px;
      }
      .kpi-value {
        font-family: var(--display);
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
      }
      .kpi-sub {
        font-size: 10px;
        color: var(--text3);
        margin-top: 3px;
        font-family: var(--mono);
      }
      .kpi-value.buy {
        color: var(--buy);
      }
      .kpi-value.sell {
        color: var(--sell);
      }

      .quarter-nav {
        display: flex;
        gap: 6px;
        padding: 10px 16px;
        overflow-x: auto;
        border-top: 1px solid var(--border);
      }
      .quarter-nav::-webkit-scrollbar {
        display: none;
      }
      .q-btn {
        font-family: var(--mono);
        font-size: 10px;
        padding: 5px 12px;
        border-radius: 6px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .q-btn:hover {
        border-color: var(--accent);
        color: var(--accent2);
      }
      .q-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        font-weight: 500;
      }

      .tabs {
        display: flex;
        border-top: 1px solid var(--border);
        background: var(--surface);
        padding: 0 20px;
      }
      .tab-btn {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text3);
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .tab-btn:hover {
        color: var(--text2);
      }
      .tab-btn.active {
        color: var(--accent2);
        border-bottom-color: var(--accent);
      }

      .content {
        padding: 24px 32px;
      }

      .filter-bar {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        align-items: center;
      }
      .filter-btn {
        font-family: var(--mono);
        font-size: 10px;
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        transition: all 0.15s;
      }
      .filter-btn:hover {
        color: var(--text2);
      }
      .filter-btn.active-all {
        background: var(--surface3);
        border-color: var(--border2);
        color: var(--text);
      }
      .filter-btn.active-new {
        background: rgba(167, 139, 250, 0.15);
        border-color: rgba(167, 139, 250, 0.4);
        color: var(--new);
      }
      .filter-btn.active-added {
        background: rgba(16, 217, 138, 0.1);
        border-color: rgba(16, 217, 138, 0.3);
        color: var(--buy);
      }
      .filter-btn.active-reduced {
        background: rgba(244, 63, 94, 0.1);
        border-color: rgba(244, 63, 94, 0.3);
        color: var(--sell);
      }
      .filter-btn.active-unchanged {
        background: rgba(71, 85, 105, 0.2);
        border-color: rgba(71, 85, 105, 0.4);
        color: var(--text3);
      }
      .filter-count {
        margin-left: 4px;
        opacity: 0.6;
        font-size: 9px;
      }

      .table-wrap {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      thead {
        background: var(--surface2);
        border-bottom: 1px solid var(--border2);
      }
      th {
        padding: 10px 14px;
        text-align: left;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.15s;
        user-select: none;
      }
      th:hover {
        color: var(--text2);
      }
      td {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tbody tr {
        transition: background 0.1s;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .holding-name {
        font-weight: 500;
        font-size: 13px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .holding-logo {
        width: 20px;
        height: 20px;
        border-radius: 5px;
        background: var(--surface3);
        object-fit: contain;
        flex-shrink: 0;
      }
      .holding-cusip {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        margin-top: 2px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 8px;
        border-radius: 20px;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .badge-new {
        background: rgba(167, 139, 250, 0.15);
        color: var(--new);
        border: 1px solid rgba(167, 139, 250, 0.3);
      }
      .badge-added {
        background: rgba(16, 217, 138, 0.1);
        color: var(--buy);
        border: 1px solid rgba(16, 217, 138, 0.25);
      }
      .badge-reduced {
        background: rgba(244, 63, 94, 0.08);
        color: var(--sell);
        border: 1px solid rgba(244, 63, 94, 0.2);
      }
      .badge-unchanged {
        background: rgba(71, 85, 105, 0.15);
        color: var(--text3);
        border: 1px solid rgba(71, 85, 105, 0.3);
      }

      .bar-bg {
        background: var(--surface3);
        border-radius: 2px;
        height: 3px;
        width: 80px;
      }
      .bar-fill {
        height: 3px;
        border-radius: 2px;
        background: var(--accent);
      }

      .moves-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .moves-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .moves-card-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .moves-card-title {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .moves-card-title.buy {
        color: var(--buy);
      }
      .moves-card-title.sell {
        color: var(--sell);
      }
      .moves-card-title.new-pos {
        color: var(--new);
      }
      .moves-count {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
      }
      .move-row {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: background 0.1s;
      }
      .move-row:last-child {
        border-bottom: none;
      }
      .move-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .move-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .move-logo {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: var(--surface3);
        object-fit: contain;
        flex-shrink: 0;
      }
      .move-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
      }
      .move-sub {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        margin-top: 1px;
      }
      .move-right {
        text-align: right;
      }
      .move-value {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
      }
      .move-delta {
        font-family: var(--mono);
        font-size: 10px;
        margin-top: 1px;
      }
      .move-delta.pos {
        color: var(--buy);
      }
      .move-delta.neg {
        color: var(--sell);
      }
      .move-delta.neutral {
        color: var(--new);
      }
      .no-moves {
        padding: 24px 16px;
        text-align: center;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text3);
      }

      .spinner-sm {
        width: 14px;
        height: 14px;
        border: 1px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      .loading-prev {
        padding: 20px 16px;
        text-align: center;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .fade-in {
        animation: fadeIn 0.25s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 860px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          height: 220px;
        }
        .moves-grid {
          grid-template-columns: 1fr;
        }
        .kpi-strip {
          grid-template-columns: repeat(3, 1fr);
        }
        .content {
          padding: 16px;
        }
        .inv-header {
          padding: 16px 16px 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-mark">S</div>
        SuperInvestors
      </div>
      <div class="header-badge">SEC EDGAR · 13F-HR · LIVE</div>
    </header>

    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-label">Institutional Managers</div>
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              type="text"
              class="search"
              id="searchBox"
              placeholder="Cerca investitore..."
            />
          </div>
        </div>
        <div
          class="investor-list"
          id="investorList"
        ></div>
      </aside>

      <main
        class="main"
        id="mainPanel"
      >
        <div class="empty">
          <div class="empty-icon">◈</div>
          <div class="empty-text">Seleziona un investitore</div>
        </div>
      </main>
    </div>

      async function loadFilings(cik) {
        try {
          const paddedCik = "CIK" + cik.replace(/^0+/, "").padStart(10, "0");
          const res = await secFetch(
            `https://data.sec.gov/submissions/${paddedCik}.json`,
          );
          if (!res.ok) throw new Error(`HTTP ${res.status} — submissions API`);
          const data = await res.json();
          const forms = data.filings?.recent?.form || [];
          const accNos = data.filings?.recent?.accessionNumber || [];
          const dates = data.filings?.recent?.filingDate || [];
          const periods = data.filings?.recent?.reportDate || [];
          const filings13f = [];
          for (let i = 0; i < forms.length; i++) {
            if (forms[i] === "13F-HR")
              filings13f.push({
                accessionNo: accNos[i],
                date: dates[i],
                period: periods[i] || dates[i],
              });
          }
          if (filings13f.length === 0) {
            showError(
              `Nessun filing 13F-HR trovato per ${activeInvestor.name}.`,
              cik,
            );
            return;
          }
          filingHistory = filings13f.slice(0, 8);
          await loadHoldings(cik, 0);
        } catch (e) {
          showError(e.message, cik);
        }
      }

      async function loadHoldings(cik, idx) {
        showLoading("Download holdings...");
        const filing = filingHistory[idx];
        if (allHoldings[filing.accessionNo]) {
          renderInvestor(cik, idx, allHoldings[filing.accessionNo]);
          return;
        }
        try {
          const cleanAcc = formatAccession(filing.accessionNo);
          const cidx = cikNum(cik);
          const xmlUrl = await findXmlUrl(cidx, cleanAcc, filing.accessionNo);
          if (!xmlUrl) throw new Error("File XML non trovato");
          const xmlRes = await secFetch(xmlUrl);
          if (!xmlRes.ok) throw new Error(`HTTP ${xmlRes.status}`);
          const xmlText = await xmlRes.text();
          const holdings = parseXML13F(xmlText);
          if (holdings.length === 0)
            throw new Error("Nessun holding trovato (formato non supportato)");
          allHoldings[filing.accessionNo] = holdings;
          activeFilingIdx = idx;
          renderInvestor(cik, idx, holdings);
          // Pre-carica trimestre precedente in background
          if (
            idx === 0 &&
            filingHistory[1] &&
            !allHoldings[filingHistory[1].accessionNo]
          ) {
            const prev = filingHistory[1];
            const pClean = formatAccession(prev.accessionNo);
            const capturedCik = cik;
            const capturedHoldings = holdings;
            findXmlUrl(cidx, pClean, prev.accessionNo)
              .then((url) => secFetch(url))
              .then((r) => r.text())
              .then((txt) => {
                const h = parseXML13F(txt);
                if (h.length > 0) {
                  allHoldings[prev.accessionNo] = h;
                  if (
                    activeInvestor?.cik === capturedCik &&
                    activeFilingIdx === 0
                  )
                    renderInvestor(capturedCik, 0, capturedHoldings);
                }
              })
              .catch(() => {});
          }
        } catch (e) {
          showError(e.message, cik);
        }
      }

      async function findXmlUrl(cidx, cleanAcc, accessionNo) {
        const base = `https://www.sec.gov/Archives/edgar/data/${cidx}/${cleanAcc}`;
        try {
          const r = await secFetch(`${base}/${accessionNo}-index.json`);
          if (r.ok) {
            const data = await r.json();
            const items = data.directory?.item || [];
            let f = items.find((x) => x.type === "INFORMATION TABLE");
            if (!f)
              f = items.find(
                (x) =>
                  x.name?.toLowerCase().endsWith(".xml") &&
                  (x.name.toLowerCase().includes("infotable") ||
                    x.name.toLowerCase().includes("information")),
              );
            if (!f)
              f = items.find(
                (x) =>
                  x.name?.toLowerCase().endsWith(".xml") &&
                  !x.name.toLowerCase().includes("primary"),
              );
            if (f?.name) return `${base}/${f.name}`;
          }
        } catch {}
        for (const name of [
          "infotable.xml",
          "form13fInfoTable.xml",
          "informationtable.xml",
          "InfoTable.xml",
          "xslForm13F_X02.xml",
        ]) {
          try {
            const r = await secFetch(`${base}/${name}`, "HEAD");
            if (r.ok) return `${base}/${name}`;
          } catch {}
        }
        try {
          const r = await secFetch(`${base}/${accessionNo}-index.htm`);
          if (r.ok) {
            const html = await r.text();
            const rows = [...html.matchAll(/<tr[^>]*>[\s\S]*?<\/tr>/gi)];
            for (const row of rows) {
              if (/information.?table|infotable/i.test(row[0])) {
                const m = row[0].match(/href="([^"]+\.xml)"/i);
                if (m) return `${base}/${m[1].split("/").pop()}`;
              }
            }
            const allXml = [...html.matchAll(/href="([^"]*\.xml)"/gi)];
            if (allXml.length > 1)
              return `${base}/${allXml[1][1].split("/").pop()}`;
            if (allXml.length === 1)
              return `${base}/${allXml[0][1].split("/").pop()}`;
          }
        } catch {}
        return `${base}/${accessionNo}.txt`;
      }

      function parseXML13F(rawText) {
        let xmlText = rawText;
        if (
          rawText.includes("<SEQUENCE>") ||
          rawText.includes("-----BEGIN PRIVACY-ENHANCED MESSAGE-----")
        ) {
          const m =
            rawText.match(/<informationTable[\s\S]*?<\/informationTable>/i) ||
            rawText.match(/<infoTable[\s\S]*?<\/infoTable>/i);
          if (m) xmlText = m[0];
          else {
            const starts = [...rawText.matchAll(/<\?xml/gi)].map(
              (x) => x.index,
            );
            if (starts.length > 0)
              xmlText = rawText.substring(
                starts.length > 1 ? starts[starts.length - 1] : starts[0],
              );
          }
        }
        const clean = xmlText
          .replace(/<\?xml[^>]*\?>/g, "")
          .replace(/\s+xmlns(?::[a-zA-Z0-9_]+)?="[^"]*"/g, "")
          .replace(/\s+xsi:[a-zA-Z:]+="[^"]*"/g, "")
          .replace(/<([a-zA-Z0-9_]+):/g, "<")
          .replace(/<\/([a-zA-Z0-9_]+):/g, "</");
        const doc = new DOMParser().parseFromString(clean, "text/xml");
        const entries = doc.querySelectorAll("infoTable");
        if (entries.length === 0) return [];
        const holdings = [];
        entries.forEach((entry) => {
          const get = (tag) =>
            entry.querySelector(tag)?.textContent?.trim() || "";
          const name = get("nameOfIssuer");
          const cusip = get("cusip");
          const value = parseInt(get("value") || "0", 10) * 1000;
          const shares = parseInt(get("sshPrnamt") || "0", 10);
          const type = get("sshPrnamtType") || "SH";
          const putcall = get("putCall") || "";
          if (name && value > 0)
            holdings.push({ name, cusip, value, shares, type, putcall });
        });
        return holdings.sort((a, b) => b.value - a.value);
      }

      function computeMoves(current, previous) {
        if (!previous || previous.length === 0) return null;
        const prevMap = {};
        previous.forEach((h) => {
          prevMap[h.cusip || h.name] = h;
        });
        const currMap = {};
        current.forEach((h) => {
          currMap[h.cusip || h.name] = h;
        });
        const newPos = current.filter((h) => !prevMap[h.cusip || h.name]);
        const closed = previous.filter((h) => !currMap[h.cusip || h.name]);
        const changed = current.filter((h) => {
          const p = prevMap[h.cusip || h.name];
          return p && h.shares !== p.shares;
        });
        const increased = changed
          .filter((h) => h.shares > prevMap[h.cusip || h.name].shares)
          .map((h) => ({
            ...h,
            prevShares: prevMap[h.cusip || h.name].shares,
          }));
        const reduced = changed
          .filter((h) => h.shares < prevMap[h.cusip || h.name].shares)
          .map((h) => ({
            ...h,
            prevShares: prevMap[h.cusip || h.name].shares,
          }));
        return { newPos, closed, increased, reduced };
      }

      function getChangeType(h, prevMap) {
        const key = h.cusip || h.name;
        if (!prevMap || !prevMap[key]) return "new";
        if (h.shares > prevMap[key].shares) return "increased";
        if (h.shares < prevMap[key].shares) return "reduced";
        return "unchanged";
      }

      function renderInvestor(cik, idx, holdings) {
        activeFilingIdx = idx;
        const inv = activeInvestor;
        const filing = filingHistory[idx];
        const totalValue = holdings.reduce((s, h) => s + h.value, 0);
        const prevFiling = filingHistory[idx + 1];
        const prevHoldings = prevFiling
          ? allHoldings[prevFiling.accessionNo]
          : null;
        const moves = computeMoves(holdings, prevHoldings);
        const prevMap = prevHoldings
          ? Object.fromEntries(prevHoldings.map((h) => [h.cusip || h.name, h]))
          : null;
        const enriched = holdings.map((h) => ({
          ...h,
          weight: totalValue > 0 ? (h.value / totalValue) * 100 : 0,
          changeType: getChangeType(h, prevMap),
          prevShares: prevMap?.[h.cusip || h.name]?.shares || 0,
        }));
        const newCount = enriched.filter((h) => h.changeType === "new").length;
        const exitCount = moves?.closed?.length || 0;
        const top10 = enriched.slice(0, 10).reduce((s, h) => s + h.weight, 0);
        const counts = {
          all: enriched.length,
          new: enriched.filter((h) => h.changeType === "new").length,
          added: enriched.filter((h) => h.changeType === "increased").length,
          reduced: enriched.filter((h) => h.changeType === "reduced").length,
          unchanged: enriched.filter((h) => h.changeType === "unchanged")
            .length,
        };
        const movesTotal = moves
          ? moves.newPos.length +
            moves.closed.length +
            moves.increased.length +
            moves.reduced.length
          : 0;

        document.getElementById("mainPanel").innerHTML = `
    <div class="fade-in">

          </div>
        </div>
        <div class="kpi-strip">
          <div class="kpi-item"><div class="kpi-label">Portfolio Value</div><div class="kpi-value">${fmt.money(totalValue)}</div><div class="kpi-sub">${enriched.length} posizioni</div></div>
          <div class="kpi-item"><div class="kpi-label">Top Holding</div><div class="kpi-value" style="font-size:14px">${enriched[0]?.name?.substring(0, 16) || "—"}</div><div class="kpi-sub">${enriched[0]?.weight?.toFixed(1)}% del portafoglio</div></div>
          <div class="kpi-item"><div class="kpi-label">New Entries</div><div class="kpi-value ${newCount > 0 ? "buy" : ""}">${newCount}</div><div class="kpi-sub">nuove posizioni</div></div>
          <div class="kpi-item"><div class="kpi-label">Full Exits</div><div class="kpi-value ${exitCount > 0 ? "sell" : ""}">${prevHoldings ? exitCount : "—"}</div><div class="kpi-sub">${prevHoldings ? "posizioni chiuse" : "caricamento..."}</div></div>
          <div class="kpi-item"><div class="kpi-label">Concentrazione</div><div class="kpi-value">${top10.toFixed(1)}%</div><div class="kpi-sub">top 10 holdings</div></div>
        </div>
        <div class="quarter-nav">
          ${filingHistory.map((f, i) => `<button class="q-btn ${i === idx ? "active" : ""}" onclick="switchFiling(${i})">Q${getQ(f.period)} ${f.period?.substring(0, 4) || ""}</button>`).join("")}
        </div>
        <div class="tabs">
          <div class="tab-btn ${currentTab === "portfolio" ? "active" : ""}" onclick="switchTab('portfolio','${cik}',${idx})">Portfolio</div>
          <div class="tab-btn ${currentTab === "moves" ? "active" : ""}" onclick="switchTab('moves','${cik}',${idx})">Movimenti${moves ? ` (${movesTotal})` : ""}</div>
        </div>
      </div>
      <div class="content">
        ${currentTab === "portfolio" ? renderPortfolio(enriched, totalValue, counts) : renderMoves(moves, prevHoldings)}
      </div>
    </div>`;
      }

      function renderPortfolio(enriched, totalValue, counts) {
        let filtered = enriched;
        if (activeFilter === "new")
          filtered = enriched.filter((h) => h.changeType === "new");
        else if (activeFilter === "added")
          filtered = enriched.filter((h) => h.changeType === "increased");
        else if (activeFilter === "reduced")
          filtered = enriched.filter((h) => h.changeType === "reduced");
        else if (activeFilter === "unchanged")
          filtered = enriched.filter((h) => h.changeType === "unchanged");
        const sorted = [...filtered].sort((a, b) => {
          const av = a[sortCol] ?? 0,
            bv = b[sortCol] ?? 0;
          return sortDir === "desc" ? bv - av : av - bv;
        });
        const maxValue = enriched[0]?.value || 1;
        const si = (col) =>
          `<span style="opacity:0.5;font-size:9px">${sortCol === col ? (sortDir === "desc" ? "↓" : "↑") : "↕"}</span>`;

        return `
    <div class="filter-bar">
      <button class="filter-btn ${activeFilter === "all" ? "active-all" : ""}" onclick="setFilter('all')">Tutti <span class="filter-count">${counts.all}</span></button>
      <button class="filter-btn ${activeFilter === "new" ? "active-new" : ""}" onclick="setFilter('new')">✦ New <span class="filter-count">${counts.new}</span></button>
      <button class="filter-btn ${activeFilter === "added" ? "active-added" : ""}" onclick="setFilter('added')">▲ Added <span class="filter-count">${counts.added}</span></button>
      <button class="filter-btn ${activeFilter === "reduced" ? "active-reduced" : ""}" onclick="setFilter('reduced')">▼ Reduced <span class="filter-count">${counts.reduced}</span></button>
      <button class="filter-btn ${activeFilter === "unchanged" ? "active-unchanged" : ""}" onclick="setFilter('unchanged')">— Unchanged <span class="filter-count">${counts.unchanged}</span></button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Azienda</th>
            <th onclick="setSort('value')">Value ${si("value")}</th>
            <th onclick="setSort('shares')">Shares ${si("shares")}</th>
            <th onclick="setSort('weight')">Weight ${si("weight")}</th>
            <th>Allocazione</th>
            <th>Variazione QoQ</th>
            <th>Tipo</th>
          </tr>
        </thead>
        <tbody>
          ${sorted
            .map((h, i) => {
              const logo = logoUrl(h.name);
              const chgPct =
                h.prevShares > 0
                  ? ((h.shares - h.prevShares) / h.prevShares) * 100
                  : null;
              return `<tr>
              <td style="color:var(--text3);font-family:var(--mono);font-size:10px">${i + 1}</td>
              <td><div class="holding-name">
                ${logo ? `<img class="holding-logo" src="${logo}" onerror="this.style.display='none'" loading="lazy">` : ""}
                <div><div>${h.name}</div>${h.cusip ? `<div class="holding-cusip">${h.cusip}</div>` : ""}</div>
              </div></td>
              <td style="font-family:var(--mono);font-weight:500">${fmt.money(h.value)}</td>
              <td style="font-family:var(--mono)">${fmt.shares(h.shares)}</td>
              <td style="font-family:var(--mono)">${h.weight.toFixed(2)}%</td>
              <td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round((h.value / maxValue) * 80)}px"></div></div></td>
              <td>${activityBadge(h.changeType, chgPct)}</td>
              <td style="font-family:var(--mono);font-size:10px;color:var(--text3)">${h.type || "SH"}${h.putcall ? " " + h.putcall : ""}</td>
            </tr>`;
            })
            .join("")}

    </div>`;
      }

      function activityBadge(type, chgPct) {
        if (type === "new") return `<span class="badge badge-new">✦ New</span>`;
        if (type === "increased")
          return `<span class="badge badge-added">▲ ${chgPct !== null ? fmt.pct(chgPct) : "Added"}</span>`;
        if (type === "reduced")
          return `<span class="badge badge-reduced">▼ ${chgPct !== null ? fmt.pct(chgPct) : "Reduced"}</span>`;
        return `<span class="badge badge-unchanged">— Unchanged</span>`;
      }

      function renderMoves(moves, prevHoldings) {
        if (!prevHoldings)
          return `<div class="loading-prev"><div class="spinner-sm"></div>Caricamento trimestre precedente in background...</div>`;
        if (!moves)
          return `<div class="no-moves">Nessun dato disponibile.</div>`;

        const row = (h, type) => {
          const logo = logoUrl(h.name);
          const chgPct =
            h.prevShares > 0
              ? ((h.shares - h.prevShares) / h.prevShares) * 100
              : null;
          const deltaHtml =
            type === "new"
              ? `<div class="move-delta neutral">New Position</div>`
              : type === "closed"
                ? `<div class="move-delta neg">Full Exit</div>`
                : type === "up"
                  ? `<div class="move-delta pos">▲ ${chgPct !== null ? Math.abs(chgPct).toFixed(1) + "%" : ""}</div>`
                  : `<div class="move-delta neg">▼ ${chgPct !== null ? Math.abs(chgPct).toFixed(1) + "%" : ""}</div>`;
          const sub =
            type === "closed"
              ? `${fmt.shares(h.shares)} sh vendute`
              : type === "up" || type === "down"
                ? `${fmt.shares(h.prevShares)} → ${fmt.shares(h.shares)} sh`
                : `${fmt.shares(h.shares)} sh`;
          return `<div class="move-row">
      <div class="move-left">
        ${logo ? `<img class="move-logo" src="${logo}" onerror="this.style.display='none'" loading="lazy">` : '<div class="move-logo"></div>'}
        <div><div class="move-name">${h.name.substring(0, 24)}</div><div class="move-sub">${sub}</div></div>
      </div>
      <div class="move-right"><div class="move-value">${fmt.money(h.value)}</div>${deltaHtml}</div>
    </div>`;
        };

        const card = (title, cls, items, type) => `
    <div class="moves-card">
      <div class="moves-card-header">
        <div class="moves-card-title ${cls}">${title}</div>
        <div class="moves-count">${items.length}</div>
      </div>
      ${
        items.length === 0
          ? '<div class="no-moves">Nessun movimento</div>'
          : items
              .slice(0, 15)
              .map((h) => row(h, type))
              .join("")
      }
    </div>`;

        return `<div class="moves-grid">
    ${card("✦ Nuove Posizioni", "new-pos", moves.newPos, "new")}
    ${card("✕ Posizioni Chiuse", "sell", moves.closed, "closed")}
    ${card("▲ Aumentate", "buy", moves.increased, "up")}
    ${card("▼ Ridotte", "sell", moves.reduced, "down")}
  </div>`;
      }

      function getQ(period) {
        if (!period) return "?";
        const m = parseInt(period.substring(5, 7));
        if (m <= 3) return 1;
        if (m <= 6) return 2;
        if (m <= 9) return 3;
        return 4;
      }

      function setFilter(f) {
        activeFilter = f;
        const h = allHoldings[filingHistory[activeFilingIdx].accessionNo];
        if (h) renderInvestor(activeInvestor.cik, activeFilingIdx, h);
      }
      function setSort(col) {
        if (sortCol === col) sortDir = sortDir === "desc" ? "asc" : "desc";
        else {
          sortCol = col;
          sortDir = "desc";
        }
        const h = allHoldings[filingHistory[activeFilingIdx].accessionNo];
        if (h) renderInvestor(activeInvestor.cik, activeFilingIdx, h);
      }
      function switchTab(tab, cik, idx) {
        currentTab = tab;
        const h = allHoldings[filingHistory[idx].accessionNo];
        if (h) renderInvestor(cik, idx, h);
      }
      async function switchFiling(idx) {
        currentTab = "portfolio";
        activeFilter = "all";
        await loadHoldings(activeInvestor.cik, idx);
      }

      document
        .getElementById("searchBox")
        .addEventListener("input", (e) => renderList(e.target.value));
      renderList();
    </script>
  </body>
</html>
