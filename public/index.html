<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>SuperInvestors — 13F Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #07090e;
        --surface: #0c0f18;
        --surface2: #111520;
        --surface3: #161c2c;
        --border: #1c2338;
        --border2: #222a40;
        --text: #e4eaf6;
        --text2: #7b8db0;
        --text3: #384660;
        --accent: #3b82f6;
        --accent2: #60a5fa;
        --buy: #22c55e;
        --buy2: #16a34a;
        --sell: #f43f5e;
        --sell2: #e11d48;
        --new: #a78bfa;
        --gold: #f59e0b;
        --teal: #14b8a6;
        --display: "Syne", sans-serif;
        --body: "DM Sans", sans-serif;
        --mono: "DM Mono", monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
      }

      /* ── APP SHELL ── */
      .shell {
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        overflow: hidden;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-brand {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .brand-mark {
        width: 30px;
        height: 30px;
        background: linear-gradient(135deg, var(--accent), #818cf8);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-size: 14px;
        font-weight: 800;
        color: white;
      }
      .brand-name {
        font-family: var(--display);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      .brand-sub {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text3);
        letter-spacing: 0.08em;
      }

      .sidebar-search {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .search-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 7px 12px 7px 30px;
        color: var(--text);
        font-family: var(--body);
        font-size: 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      .search-input:focus {
        border-color: var(--accent);
      }
      .search-input::placeholder {
        color: var(--text3);
      }
      .search-wrap {
        position: relative;
      }
      .search-ico {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        font-size: 12px;
        pointer-events: none;
      }

      .inv-list {
        overflow-y: auto;
        flex: 1;
      }
      .inv-list::-webkit-scrollbar {
        width: 2px;
      }
      .inv-list::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      .inv-row {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background 0.1s;
        position: relative;
      }
      .inv-row::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .inv-row:hover {
        background: rgba(59, 130, 246, 0.05);
      }
      .inv-row:hover::before {
        opacity: 0.4;
      }
      .inv-row.active {
        background: rgba(59, 130, 246, 0.1);
      }
      .inv-row.active::before {
        opacity: 1;
      }
      .inv-ava {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        background: var(--surface3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--display);
        font-size: 12px;
        font-weight: 700;
        color: var(--text2);
        flex-shrink: 0;
      }
      .inv-inf {
        flex: 1;
        min-width: 0;
      }
      .inv-n {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .inv-f {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text3);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tag {
        font-family: var(--mono);
        font-size: 8px;
        padding: 1px 5px;
        border-radius: 3px;
        background: var(--surface3);
        color: var(--text3);
        flex-shrink: 0;
      }

      /* ── MAIN ── */
      .main {
        overflow-y: auto;
        background: var(--bg);
      }
      .main::-webkit-scrollbar {
        width: 3px;
      }
      .main::-webkit-scrollbar-thumb {
        background: var(--border2);
      }

      /* ── STATES ── */
      .centered {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--text3);
        font-family: var(--mono);
        font-size: 12px;
      }
      .spinner {
        width: 26px;
        height: 26px;
        border: 2px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error {
        margin: 24px;
        background: rgba(244, 63, 94, 0.08);
        border: 1px solid rgba(244, 63, 94, 0.2);
        border-radius: 10px;
        padding: 18px 20px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--sell);
        line-height: 1.8;
      }

      /* ── INVESTOR HEADER ── */
      .inv-hdr {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 20px 28px 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .hdr-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .hdr-left {
      }
      .hdr-fund {
        font-family: var(--display);
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--text);
        line-height: 1;
      }
      .hdr-manager {
        font-size: 13px;
        color: var(--text2);
        margin-top: 4px;
      }
      .hdr-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        flex-wrap: wrap;
      }
      .hdr-pill {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text3);
        padding: 2px 7px;
        border: 1px solid var(--border2);
        border-radius: 4px;
        letter-spacing: 0.05em;
      }
      .hdr-right {
        display: flex;
        gap: 8px;
      }
      .hdr-btn {
        font-family: var(--mono);
        font-size: 10px;
        padding: 6px 14px;
        border-radius: 7px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .hdr-btn:hover {
        border-color: var(--accent);
        color: var(--accent2);
      }
      .hdr-btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        font-weight: 500;
      }
      .hdr-btn.primary:hover {
        background: #2563eb;
        border-color: #2563eb;
      }

      /* ── KPI CARDS ── */
      .kpi-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--border);
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        margin: 0 -28px;
      }
      .kpi-card {
        background: var(--surface);
        padding: 16px 20px;
      }
      .kpi-lbl {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 6px;
      }
      .kpi-val {
        font-family: var(--display);
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--text);
        line-height: 1;
      }
      .kpi-sub {
        font-size: 11px;
        color: var(--text3);
        margin-top: 4px;
      }
      .kpi-val.green {
        color: var(--buy);
      }
      .kpi-val.red {
        color: var(--sell);
      }

      /* ── QUARTER NAV ── */
      .q-nav {
        display: flex;
        gap: 5px;
        padding: 10px 0;
        overflow-x: auto;
        border-top: 1px solid var(--border);
      }
      .q-nav::-webkit-scrollbar {
        display: none;
      }
      .q-btn {
        font-family: var(--mono);
        font-size: 10px;
        padding: 4px 11px;
        border-radius: 5px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .q-btn:hover {
        border-color: var(--accent);
        color: var(--accent2);
      }
      .q-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      /* ── TABS ── */
      .tab-row {
        display: flex;
        border-top: 1px solid var(--border);
        padding: 0;
      }
      .tab {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text3);
        padding: 11px 18px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .tab:hover {
        color: var(--text2);
      }
      .tab.active {
        color: var(--accent2);
        border-bottom-color: var(--accent);
      }

      /* ── PAGE CONTENT ── */
      .page {
        padding: 24px 28px;
      }

      /* ── TWO COL LAYOUT ── */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 24px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .card-hdr {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      .card-title {
        font-family: var(--display);
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
      }
      .card-sub {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }

      /* ── GLANCE TABLE ── */
      .glance-table {
        width: 100%;
        border-collapse: collapse;
      }
      .glance-table th {
        font-family: var(--mono);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        padding: 8px 14px;
        text-align: left;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      .glance-table td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        vertical-align: middle;
      }
      .glance-table tr:last-child td {
        border-bottom: none;
      }
      .glance-table tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .ticker-cell {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .company-logo {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        object-fit: contain;
        background: var(--surface3);
        flex-shrink: 0;
      }
      .ticker {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        color: var(--accent2);
      }
      .co-name {
        font-size: 11px;
        color: var(--text2);
        margin-top: 1px;
      }

      /* ── ALLOCATION BARS ── */
      .alloc-list {
        padding: 8px 18px 14px;
      }
      .alloc-row {
        display: grid;
        grid-template-columns: 90px 1fr 52px;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
      }
      .alloc-name {
        font-size: 11px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .alloc-bar-wrap {
        background: var(--surface3);
        border-radius: 3px;
        height: 6px;
        position: relative;
        overflow: hidden;
      }
      .alloc-bar {
        height: 100%;
        border-radius: 3px;
        background: var(--teal);
        transition: width 0.4s ease;
      }
      .alloc-pct {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
        text-align: right;
      }

      .alloc-footer {
        padding: 10px 18px;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        display: flex;
        gap: 16px;
      }
      .alloc-footer span {
        color: var(--text2);
      }

      /* ── CHANGED SECTION ── */
      .section-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .section-title {
        font-family: var(--display);
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }

      .filter-row {
        display: flex;
        gap: 5px;
        align-items: center;
        flex-wrap: wrap;
      }
      .f-btn {
        font-family: var(--mono);
        font-size: 10px;
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        transition: all 0.15s;
      }
      .f-btn:hover {
        color: var(--text2);
      }
      .f-btn.f-all {
        background: var(--surface3);
        color: var(--text);
        border-color: var(--border2);
      }
      .f-btn.f-new {
        background: rgba(167, 139, 250, 0.12);
        color: var(--new);
        border-color: rgba(167, 139, 250, 0.3);
      }
      .f-btn.f-added {
        background: rgba(34, 197, 94, 0.1);
        color: var(--buy);
        border-color: rgba(34, 197, 94, 0.25);
      }
      .f-btn.f-reduced {
        background: rgba(244, 63, 94, 0.08);
        color: var(--sell);
        border-color: rgba(244, 63, 94, 0.2);
      }
      .f-btn.f-unchanged {
        background: rgba(71, 85, 105, 0.15);
        color: var(--text3);
        border-color: rgba(71, 85, 105, 0.3);
      }
      .f-cnt {
        opacity: 0.5;
        font-size: 9px;
        margin-left: 3px;
      }

      /* ── MAIN TABLE ── */
      .tbl-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        overflow-x: auto;
        margin-bottom: 24px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead {
        background: var(--surface2);
      }
      th {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        padding: 10px 14px;
        text-align: left;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
        transition: color 0.15s;
      }
      th:hover {
        color: var(--text2);
      }
      th.sorted {
        color: var(--accent2);
      }
      td {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        vertical-align: middle;
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .stock-cell {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .stock-logo {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        object-fit: contain;
        background: var(--surface3);
        flex-shrink: 0;
      }
      .stock-ticker {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }
      .stock-name {
        font-size: 10px;
        color: var(--text3);
        margin-top: 1px;
      }

      .price-cell {
        font-family: var(--mono);
        font-size: 12px;
      }
      .price-val {
        color: var(--text);
      }
      .price-chg {
        font-size: 10px;
        margin-top: 1px;
      }
      .price-chg.up {
        color: var(--buy);
      }
      .price-chg.dn {
        color: var(--sell);
      }

      /* ── BADGES ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        padding: 2px 8px;
        border-radius: 20px;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .b-new {
        background: rgba(167, 139, 250, 0.12);
        color: var(--new);
        border: 1px solid rgba(167, 139, 250, 0.25);
      }
      .b-added {
        background: rgba(34, 197, 94, 0.1);
        color: var(--buy);
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
      .b-reduced {
        background: rgba(244, 63, 94, 0.08);
        color: var(--sell);
        border: 1px solid rgba(244, 63, 94, 0.18);
      }
      .b-unchanged {
        background: rgba(71, 85, 105, 0.12);
        color: var(--text3);
        border: 1px solid rgba(71, 85, 105, 0.25);
      }
      .b-sold {
        background: rgba(244, 63, 94, 0.15);
        color: var(--sell);
        border: 1px solid rgba(244, 63, 94, 0.3);
      }

      .num {
        font-family: var(--mono);
        font-size: 12px;
      }
      .num.muted {
        color: var(--text2);
      }
      .num.green {
        color: var(--buy);
      }
      .num.red {
        color: var(--sell);
      }

      /* ── VIEW ALL ── */
      .view-all {
        text-align: right;
        padding: 10px 18px;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        cursor: pointer;
        transition: color 0.15s;
      }
      .view-all:hover {
        color: var(--accent2);
      }

      /* ── MOVES GRID ── */
      .moves-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 24px;
      }
      .move-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .move-card-hdr {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .move-card-title {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .move-card-title.c-new {
        color: var(--new);
      }
      .move-card-title.c-sold {
        color: var(--sell);
      }
      .move-card-title.c-added {
        color: var(--buy);
      }
      .move-card-title.c-reduced {
        color: var(--sell);
      }
      .move-cnt {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
      }
      .move-row {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: background 0.1s;
      }
      .move-row:last-child {
        border-bottom: none;
      }
      .move-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .move-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .move-logo {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        object-fit: contain;
        background: var(--surface3);
        flex-shrink: 0;
      }
      .move-n {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
      }
      .move-s {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        margin-top: 1px;
      }
      .move-r {
        text-align: right;
      }
      .move-v {
        font-family: var(--mono);

      // ─── FMP PRICES ───────────────────────────────────────────────────────────────

      // ─── SELECT ────────────────────────────────────────────────────────────────────
      async function pick(cik) {
        INV = INVESTORS.find((i) => i.cik === cik);

      function err(msg, cik) {
        $("main").innerHTML =
          `<div class="error">⚠ ${msg}<br><br><a href="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cikN(cik)}&type=13F-HR" target="_blank" style="color:var(--accent2)">Apri su SEC EDGAR ↗</a></div>`;
      }

      // ─── LOAD FILINGS ─────────────────────────────────────────────────────────────
      async function loadFilings(cik) {
        try {
          const pk = "CIK" + cik.replace(/^0+/, "").padStart(10, "0");
          const r = await sec(`https://data.sec.gov/submissions/${pk}.json`);
          if (!r.ok) throw new Error(`HTTP ${r.status} — submissions API`);
          const d = await r.json();
          const forms = d.filings?.recent?.form || [],
            acc = d.filings?.recent?.accessionNumber || [];
          const dates = d.filings?.recent?.filingDate || [],
            periods = d.filings?.recent?.reportDate || [];
          const f13 = [];
          for (let i = 0; i < forms.length; i++)
            if (forms[i] === "13F-HR")
              f13.push({
                acc: acc[i],
                date: dates[i],
                period: periods[i] || dates[i],
              });
          if (!f13.length) {
            err("Nessun filing 13F-HR trovato.", cik);
            return;
          }
          FILINGS = f13.slice(0, 8);
          await loadHoldings(cik, 0);
        } catch (e) {
          err(e.message, cik);
        }
      }

      // ─── LOAD HOLDINGS ────────────────────────────────────────────────────────────
      async function loadHoldings(cik, idx) {
        loading("Download holdings...");
        const f = FILINGS[idx];
        if (HOLDINGS[f.acc]) {
          fidx = idx;
          render(cik, idx);
          return;
        }
        try {
          const ca = fmtAcc(f.acc),
            ci = cikN(cik);
          const xmlUrl = await findXml(ci, ca, f.acc);
          const xr = await sec(xmlUrl);
          if (!xr.ok) throw new Error(`HTTP ${xr.status}`);
          const xt = await xr.text();
          const h = parseXml(xt);
          if (!h.length)
            throw new Error("Nessun holding trovato (formato non supportato)");
          HOLDINGS[f.acc] = h;
          fidx = idx;
          render(cik, idx);
          // background prev quarter
          if (idx === 0 && FILINGS[1] && !HOLDINGS[FILINGS[1].acc]) {
            const pf = FILINGS[1],
              pca = fmtAcc(pf.acc),
              ci2 = cikN(cik),
              cap = cik,
              capH = h;
            findXml(ci2, pca, pf.acc)
              .then((u) => sec(u))
              .then((r) => r.text())
              .then((t) => {
                const ph = parseXml(t);
                if (ph.length) {
                  HOLDINGS[pf.acc] = ph;
                  if (INV?.cik === cap && fidx === 0) render(cap, 0);
                }
              })
              .catch(() => {});
          }
        } catch (e) {
          err(e.message, cik);
        }
      }

      // ─── FIND XML ─────────────────────────────────────────────────────────────────
      async function findXml(ci, ca, acc) {
        const base = `https://www.sec.gov/Archives/edgar/data/${ci}/${ca}`;
        try {
          const r = await sec(`${base}/${acc}-index.json`);
          if (r.ok) {
            const d = await r.json();
            const items = d.directory?.item || [];
            let f = items.find((x) => x.type === "INFORMATION TABLE");
            if (!f)
              f = items.find(
                (x) =>
                  x.name?.toLowerCase().endsWith(".xml") &&
                  (x.name.toLowerCase().includes("infotable") ||
                    x.name.toLowerCase().includes("information")),
              );
            if (!f)
              f = items.find(
                (x) =>
                  x.name?.toLowerCase().endsWith(".xml") &&
                  !x.name.toLowerCase().includes("primary"),
              );
            if (f?.name) return `${base}/${f.name}`;
          }
        } catch {}
        for (const n of [
          "infotable.xml",
          "form13fInfoTable.xml",
          "informationtable.xml",
          "InfoTable.xml",
          "xslForm13F_X02.xml",
        ]) {
          try {
            const r = await sec(`${base}/${n}`, "HEAD");
            if (r.ok) return `${base}/${n}`;
          } catch {}
        }
        try {
          const r = await sec(`${base}/${acc}-index.htm`);
          if (r.ok) {
            const html = await r.text();
            const rows = [...html.matchAll(/<tr[^>]*>[\s\S]*?<\/tr>/gi)];
            for (const row of rows) {
              if (/information.?table|infotable/i.test(row[0])) {
                const m = row[0].match(/href="([^"]+\.xml)"/i);
                if (m) return `${base}/${m[1].split("/").pop()}`;
              }
            }
            const ax = [...html.matchAll(/href="([^"]*\.xml)"/gi)];
            if (ax.length > 1) return `${base}/${ax[1][1].split("/").pop()}`;
            if (ax.length === 1) return `${base}/${ax[0][1].split("/").pop()}`;
          }
        } catch {}
        return `${base}/${acc}.txt`;
      }

      // ─── PARSE XML ────────────────────────────────────────────────────────────────
      function parseXml(raw) {
        let x = raw;
        if (raw.includes("<SEQUENCE>") || raw.includes("-----BEGIN PRIVACY")) {
          const m =
            raw.match(/<informationTable[\s\S]*?<\/informationTable>/i) ||
            raw.match(/<infoTable[\s\S]*?<\/infoTable>/i);
          if (m) x = m[0];
          else {
            const s = [...raw.matchAll(/<\?xml/gi)].map((a) => a.index);
            if (s.length)
              x = raw.substring(s.length > 1 ? s[s.length - 1] : s[0]);
          }
        }
        const c = x
          .replace(/<\?xml[^>]*\?>/g, "")
          .replace(/\s+xmlns(?::[a-zA-Z0-9_]+)?="[^"]*"/g, "")
          .replace(/\s+xsi:[a-zA-Z:]+="[^"]*"/g, "")
          .replace(/<([a-zA-Z0-9_]+):/g, "<")
          .replace(/<\/([a-zA-Z0-9_]+):/g, "</");
        const doc = new DOMParser().parseFromString(c, "text/xml");
        const entries = doc.querySelectorAll("infoTable");
        if (!entries.length) return [];
        const h = [];
        entries.forEach((e) => {
          const g = (t) => e.querySelector(t)?.textContent?.trim() || "";
          const name = g("nameOfIssuer"),
            cusip = g("cusip");
          const value = parseInt(g("value") || "0", 10) * 1000;
          const shs = parseInt(g("sshPrnamt") || "0", 10);
          const type = g("sshPrnamtType") || "SH",
            pc = g("putCall") || "";
          if (name && value > 0)
            h.push({ name, cusip, value, shares: shs, type, pc });
        });
        return h.sort((a, b) => b.value - a.value);
      }

      // ─── COMPUTE MOVES ────────────────────────────────────────────────────────────
      function moves(curr, prev) {
        if (!prev || !prev.length) return null;
        const pm = {},
          cm = {};
        prev.forEach((h) => {
          pm[h.cusip || h.name] = h;
        });
        curr.forEach((h) => {
          cm[h.cusip || h.name] = h;
        });
        const newP = curr.filter((h) => !pm[h.cusip || h.name]);
        const closed = prev.filter((h) => !cm[h.cusip || h.name]);
        const changed = curr.filter((h) => {
          const p = pm[h.cusip || h.name];
          return p && h.shares !== p.shares;
        });
        const inc = changed
          .filter((h) => h.shares > pm[h.cusip || h.name].shares)
          .map((h) => ({ ...h, prevS: pm[h.cusip || h.name].shares }));
        const red = changed
          .filter((h) => h.shares < pm[h.cusip || h.name].shares)
          .map((h) => ({ ...h, prevS: pm[h.cusip || h.name].shares }));
        return { newP, closed, inc, red };
      }

      function chType(h, pm) {
        if (!pm) return "new";
        const k = h.cusip || h.name;
        if (!pm[k]) return "new";
        if (h.shares > pm[k].shares) return "inc";
        if (h.shares < pm[k].shares) return "red";
        return "unch";
      }

      // ─── RENDER ───────────────────────────────────────────────────────────────────
      function render(cik, idx) {
        const inv = INV,
          filing = FILINGS[idx],
          h = HOLDINGS[filing.acc];
        const total = h.reduce((s, x) => s + x.value, 0);
        const prevFiling = FILINGS[idx + 1],
          prevH = prevFiling ? HOLDINGS[prevFiling.acc] : null;
        const mv = moves(h, prevH);
        const pm = prevH
          ? Object.fromEntries(prevH.map((x) => [x.cusip || x.name, x]))
          : null;
        const enriched = h.map((x) => ({
          ...x,
          weight: total > 0 ? (x.value / total) * 100 : 0,
          ct: chType(x, pm),
          prevS: pm?.(x.cusip || x.name)?.shares || 0,
        }));
        const newCnt = enriched.filter((x) => x.ct === "new").length;
        const exitCnt = mv?.closed?.length || 0;
        const top10 = enriched.slice(0, 10).reduce((s, x) => s + x.weight, 0);
        const mvTotal = mv
          ? mv.newP.length + mv.closed.length + mv.inc.length + mv.red.length
          : 0;
        const counts = {
          all: enriched.length,
          new: enriched.filter((x) => x.ct === "new").length,
          added: enriched.filter((x) => x.ct === "inc").length,
          reduced: enriched.filter((x) => x.ct === "red").length,
          unchanged: enriched.filter((x) => x.ct === "unch").length,
        };

        $("main").innerHTML = `<div class="fade">
    <div class="inv-hdr">
      <div class="hdr-top">
        <div class="hdr-left">
          <div class="hdr-fund">${inv.firm}</div>
          <div class="hdr-manager">Managed by ${inv.name}</div>
          <div class="hdr-meta">
            <span class="hdr-pill">Latest report: Q${getQ(filing.period)} ${filing.period?.substring(0, 4) || ""}</span>
            <span class="hdr-pill">Filed: ${filing.date}</span>
            <span class="hdr-pill">Holdings: ${h.length}</span>
          </div>
        </div>
        <div class="hdr-right">
          <a href="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cikN(cik)}&type=13F-HR" target="_blank" class="hdr-btn">View on SEC EDGAR</a>
          <button class="hdr-btn primary" onclick="switchTab('moves','${cik}',${idx})">View latest changes</button>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-lbl">Portfolio Value</div><div class="kpi-val">${money(total)}</div><div class="kpi-sub">Reported equity holdings</div></div>
        <div class="kpi-card"><div class="kpi-lbl">Holdings</div><div class="kpi-val">${h.length}</div><div class="kpi-sub">Current reported positions</div></div>
        <div class="kpi-card"><div class="kpi-lbl">New Entries</div><div class="kpi-val ${newCnt > 0 ? "green" : ""}">${prevH ? newCnt : "—"}</div><div class="kpi-sub">Opened this quarter</div></div>
        <div class="kpi-card"><div class="kpi-lbl">New Exits</div><div class="kpi-val ${exitCnt > 0 ? "red" : ""}">${prevH ? exitCnt : "—"}</div><div class="kpi-sub">Fully sold this quarter</div></div>
      </div>
      <div class="q-nav">
        ${FILINGS.map((f, i) => `<button class="q-btn ${i === idx ? "active" : ""}" onclick="go(${i})">Q${getQ(f.period)} ${f.period?.substring(0, 4) || ""}</button>`).join("")}
      </div>
      <div class="tab-row">
        <div class="tab ${tab === "overview" ? "active" : ""}" onclick="switchTab('overview','${cik}',${idx})">Overview</div>
        <div class="tab ${tab === "portfolio" ? "active" : ""}" onclick="switchTab('portfolio','${cik}',${idx})">Portfolio</div>
        <div class="tab ${tab === "moves" ? "active" : ""}" onclick="switchTab('moves','${cik}',${idx})">Buys & Sells${mv ? ` (${mvTotal})` : ""}</div>
      </div>
    </div>
    <div class="page" id="pageContent">
      ${tab === "overview" ? renderOverview(enriched, total, mv, prevH) : tab === "moves" ? renderMoves(mv, prevH) : renderPortfolioFull(enriched, total, counts)}
    </div>
  </div>`;
      }

      // ─── OVERVIEW TAB ─────────────────────────────────────────────────────────────
      function renderOverview(enriched, total, mv, prevH) {
        const top8 = enriched.slice(0, 8);
        const maxW = enriched[0]?.weight || 1;

        // Portfolio at a glance table
        const glanceRows = top8
          .map((h) => {
            const chgPct =
              h.prevS > 0 ? ((h.shares - h.prevS) / h.prevS) * 100 : null;
            return `<tr>
      <td><div class="ticker-cell">
        ${logoImg(h.name, 22)}
        <div><div class="ticker">${h.name.substring(0, 6).replace(/ .*/, "")}</div></div>
      </div></td>
      <td><div class="co-name" style="max-width:110px;overflow:hidden;text-overflow:ellipsis">${h.name.substring(0, 20)}</div></td>
      <td><span class="num">${money(h.value)}</span></td>
      <td>${actBadge(h.ct, chgPct)}</td>
    </tr>`;
          })
          .join("");

        // Allocation bars
        const allocRows = top8
          .map(
            (h) => `
    <div class="alloc-row">
      <div class="alloc-name">${h.name.split(" ")[0]}</div>
      <div class="alloc-bar-wrap"><div class="alloc-bar" style="width:${Math.round((h.weight / maxW) * 100)}%"></div></div>
      <div class="alloc-pct">${h.weight.toFixed(1)}%</div>
    </div>`,
          )
          .join("");

        const top5 = enriched.slice(0, 5).reduce((s, h) => s + h.weight, 0);
        const top10 = enriched.slice(0, 10).reduce((s, h) => s + h.weight, 0);

        // "What changed" table — top 10 with changes
        const changed = enriched.filter((h) => h.ct !== "unch").slice(0, 10);
        const changedRows = changed.length
          ? changed
              .map((h, i) => {
                const chgPct =
                  h.prevS > 0 ? ((h.shares - h.prevS) / h.prevS) * 100 : null;
                return `<tr>
      <td><div class="stock-cell">
        ${logoImg(h.name, 22)}
        <div><div class="stock-ticker">${h.name.split(" ").slice(0, 2).join(" ").substring(0, 12)}</div><div class="stock-name">${h.name.substring(0, 20)}</div></div>
      </div></td>
      <td><span class="num muted">${shares(h.shares)}</span></td>
      <td><span class="num">${money(h.value)}</span></td>
      <td><span class="num muted">${h.weight.toFixed(2)}%</span></td>
      <td>${actBadge(h.ct, chgPct)}</td>
      <td><span class="num muted" id="price-${h.cusip || i}">—</span></td>
    </tr>`;
              })
              .join("")
          : `<tr><td colspan="6" style="padding:20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)">${prevH ? "Nessun movimento questo quarter" : "Caricamento dati precedenti..."}</td></tr>`;

        // Load prices async for changed items
        setTimeout(() => loadPricesForRows(changed), 100);

        return `
    <div class="two-col">
      <!-- Portfolio at a glance -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Portfolio at a glance</div>
          <div class="card-sub">Largest reported positions by portfolio weight</div>
        </div>
        <table class="glance-table">
          <thead><tr><th>Ticker</th><th>Company</th><th>Market Value</th><th>Activity</th></tr></thead>
          <tbody>${glanceRows}</tbody>
        </table>
        <div class="view-all" onclick="switchTabDirect('portfolio')">View full portfolio →</div>
      </div>

      <!-- Top Holdings Allocation -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Top Holdings Allocation</div>
          <div class="card-sub">Top 10 holdings as portfolio %</div>
        </div>
        <div class="alloc-list">${allocRows}</div>
        <div class="alloc-footer">
          <span>Top 5: <span>${top5.toFixed(1)}%</span></span>
          <span>Top 10: <span>${top10.toFixed(1)}%</span></span>
        </div>
      </div>
    </div>

    <!-- What changed -->
    <div class="section-hdr">
      <div class="section-title">What changed this quarter</div>
      <div class="filter-row" id="filterRow">
        ${filterBtns(counts_from(enriched))}
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Stock</th><th>Shares</th><th>Reported Value</th><th>% of Portfolio</th><th>Activity</th><th>Current Price</th></tr></thead>
        <tbody id="changedBody">${changedRows}</tbody>
      </table>
    </div>
  `;
      }

      function counts_from(enriched) {
        return {
          all: enriched.length,
          new: enriched.filter((h) => h.ct === "new").length,
          added: enriched.filter((h) => h.ct === "inc").length,
          reduced: enriched.filter((h) => h.ct === "red").length,
          unchanged: enriched.filter((h) => h.ct === "unch").length,
        };
      }

      // ─── PORTFOLIO FULL TAB ───────────────────────────────────────────────────────
      function renderPortfolioFull(enriched, total, counts) {
        let filtered = enriched;
        if (filter === "new") filtered = enriched.filter((h) => h.ct === "new");
        else if (filter === "added")
          filtered = enriched.filter((h) => h.ct === "inc");
        else if (filter === "reduced")
          filtered = enriched.filter((h) => h.ct === "red");
        else if (filter === "unchanged")
          filtered = enriched.filter((h) => h.ct === "unch");
        const sorted = [...filtered].sort((a, b) => {
          const av = a[sortK] ?? 0,
            bv = b[sortK] ?? 0;
          return sortD === "desc" ? bv - av : av - bv;
        });
        const maxV = enriched[0]?.value || 1;
        const si = (k) =>
          `<span style="opacity:.5;font-size:9px">${sortK === k ? (sortD === "desc" ? "↓" : "↑") : "↕"}</span>`;

        setTimeout(() => loadPricesForRows(sorted.slice(0, 20)), 100);

        return `
    <div class="section-hdr" style="margin-bottom:14px">
      <div class="section-title">Portfolio Holdings</div>
      <div class="filter-row">${filterBtns(counts)}</div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:28px">#</th>
          <th>Stock</th>
          <th onclick="srt('value')">Reported Value ${si("value")}</th>
          <th onclick="srt('shares')">Shares ${si("shares")}</th>
          <th onclick="srt('weight')">% Portfolio ${si("weight")}</th>
          <th>Bar</th>
          <th>Activity</th>
          <th>Current Price</th>
        </tr></thead>
        <tbody>
          ${sorted
            .map((h, i) => {
              const chgPct =
                h.prevS > 0 ? ((h.shares - h.prevS) / h.prevS) * 100 : null;
              return `<tr>
              <td style="color:var(--text3);font-family:var(--mono);font-size:10px">${i + 1}</td>
              <td><div class="stock-cell">
                ${logoImg(h.name, 22)}
                <div><div class="stock-ticker">${h.name.split(" ").slice(0, 2).join(" ").substring(0, 14)}</div>
                ${h.cusip ? `<div class="stock-name">${h.cusip}</div>` : ""}
                </div>
              </div></td>
              <td><span class="num">${money(h.value)}</span></td>
              <td><span class="num muted">${shares(h.shares)}</span></td>
              <td><span class="num muted">${h.weight.toFixed(2)}%</span></td>
              <td><div style="background:var(--surface3);border-radius:2px;height:3px;width:70px"><div style="height:3px;border-radius:2px;background:var(--teal);width:${Math.round((h.value / maxV) * 70)}px"></div></div></td>
              <td>${actBadge(h.ct, chgPct)}</td>
              <td><span class="num muted" id="price-${h.cusip || i}">—</span></td>
            </tr>`;
            })
            .join("")}
        </tbody>
      </table>
    </div>`;
      }

      // ─── MOVES TAB ────────────────────────────────────────────────────────────────
      function renderMoves(mv, prevH) {
        if (!prevH)
          return `<div class="loading-row"><div class="spin-sm"></div>Caricamento trimestre precedente...</div>`;
        if (!mv)
          return `<div style="padding:24px;font-family:var(--mono);font-size:11px;color:var(--text3);text-align:center">Nessun dato disponibile.</div>`;

        const mrow = (h, type) => {
          const chgPct =
            h.prevS > 0 ? ((h.shares - h.prevS) / h.prevS) * 100 : null;
          const delta =
            type === "new"
              ? `<div class="move-d neu">New Position</div>`
              : type === "closed"
                ? `<div class="move-d neg">Full Exit</div>`
                : type === "inc"
                  ? `<div class="move-d pos">▲ ${chgPct !== null ? Math.abs(chgPct).toFixed(1) + "%" : ""}</div>`
                  : `<div class="move-d neg">▼ ${chgPct !== null ? Math.abs(chgPct).toFixed(1) + "%" : ""}</div>`;
          const sub =
            type === "inc" || type === "red"
              ? `${shares(h.prevS)} → ${shares(h.shares)} sh`
              : `${shares(h.shares)} sh`;
          return `<div class="move-row">
      <div class="move-left">${logoImg(h.name, 26)}<div><div class="move-n">${h.name.substring(0, 22)}</div><div class="move-s">${sub}</div></div></div>
      <div class="move-r"><div class="move-v">${money(h.value)}</div>${delta}</div>
    </div>`;
        };
        const card = (title, cls, items, type) => `<div class="move-card">
    <div class="move-card-hdr"><div class="move-card-title ${cls}">${title}</div><div class="move-cnt">${items.length}</div></div>
    ${
      items.length
        ? items
            .slice(0, 12)
            .map((h) => mrow(h, type))
            .join("")
        : '<div class="no-move">Nessun movimento</div>'
    }
  </div>`;

        return `<div class="moves-grid">
    ${card("✦ New Positions", "c-new", mv.newP, "new")}
    ${card("✕ Full Exits", "c-sold", mv.closed, "closed")}
    ${card("▲ Added", "c-added", mv.inc, "inc")}
    ${card("▼ Reduced", "c-reduced", mv.red, "red")}
  </div>`;
      }

      // ─── HELPERS ──────────────────────────────────────────────────────────────────
      function actBadge(ct, chgPct) {
        if (ct === "new") return `<span class="badge b-new">✦ New</span>`;
        if (ct === "inc")
          return `<span class="badge b-added">▲ ${chgPct != null ? pct(chgPct) : "Added"}</span>`;
        if (ct === "red")
          return `<span class="badge b-reduced">▼ ${chgPct != null ? pct(chgPct) : "Reduced"}</span>`;
        return `<span class="badge b-unchanged">— Unchanged</span>`;
      }

      function filterBtns(counts) {
        return `
    <button class="f-btn ${filter === "all" ? "f-all" : ""}" onclick="setF('all')">All <span class="f-cnt">${counts.all}</span></button>
    <button class="f-btn ${filter === "new" ? "f-new" : ""}" onclick="setF('new')">New <span class="f-cnt">${counts.new}</span></button>
    <button class="f-btn ${filter === "added" ? "f-added" : ""}" onclick="setF('added')">Added <span class="f-cnt">${counts.added}</span></button>
    <button class="f-btn ${filter === "reduced" ? "f-reduced" : ""}" onclick="setF('reduced')">Reduced <span class="f-cnt">${counts.reduced}</span></button>
    <button class="f-btn ${filter === "unchanged" ? "f-unchanged" : ""}" onclick="setF('unchanged')">Unchanged <span class="f-cnt">${counts.unchanged}</span></button>`;
      }

      async function loadPricesForRows(rows) {
        for (const h of rows) {
          const ticker = await findTicker(h.name);
          if (ticker) {
            const p = await fetchPrice(ticker);
            const el = document.getElementById(
              "price-" + (h.cusip || rows.indexOf(h)),
            );
            if (el && p) {
              const up = p.chg >= 0;
              el.innerHTML = `<span class="price-val">$${p.price.toFixed(2)}</span><div class="price-chg ${up ? "up" : "dn"}">${up ? "▲" : "▼"} ${Math.abs(p.chg).toFixed(2)}%</div>`;
              el.className = "";
            }
          }
        }
      }

      function switchTab(t, cik, idx) {
        tab = t;
        render(cik, idx);
      }
      function switchTabDirect(t) {
        tab = t;
        render(INV.cik, fidx);
      }
      function setF(f) {
        filter = f;
        render(INV.cik, fidx);
      }
      function srt(k) {
        if (sortK === k) sortD = sortD === "desc" ? "asc" : "desc";
        else {
          sortK = k;
          sortD = "desc";
        }
        render(INV.cik, fidx);
      }
      async function go(idx) {
        tab = "overview";
        filter = "all";
        await loadHoldings(INV.cik, idx);
      }

      // ─── INIT ─────────────────────────────────────────────────────────────────────
      $("searchBox").addEventListener("input", (e) =>
        renderSidebar(e.target.value),
      );
      renderSidebar();
    </script>
  </body>
</html>
