<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperInvestors — 13F Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0d;--surface:#111316;--surface2:#161a1f;--border:#1e2429;--border2:#252d35;--text:#e2e8f0;--text2:#8b9aaa;--text3:#4a5568;--accent:#00d4aa;--accent2:#0095ff;--buy:#00d4aa;--sell:#ff4757;--new:#a78bfa;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.app{display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sb-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sb-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.sb-search{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--text3)}
.sb-list{overflow-y:auto;flex:1}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border2)}
.inv-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.inv-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);transform:scaleY(0);transition:transform .2s}
.inv-item:hover{background:rgba(0,212,170,.04)}
.inv-item:hover::before{transform:scaleY(1)}
.inv-item.active{background:rgba(0,212,170,.08)}
.inv-item.active::before{transform:scaleY(1)}
.inv-name{font-weight:600;font-size:13px;margin-bottom:2px}
.inv-firm{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px}
.inv-meta{display:flex;gap:10px}
.inv-tag{font-family:var(--mono);font-size:9px;color:var(--text3)}
.inv-tag span{color:var(--text2)}
.main{overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:var(--border2)}
.centered{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3);font-family:var(--mono);font-size:12px}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{margin:24px;background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:8px;padding:18px 20px;font-family:var(--mono);font-size:12px;color:var(--sell);line-height:1.7}
.inv-hdr{padding:24px 32px 0;background:rgba(10,11,13,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.hdr-name{font-size:26px;font-weight:600;letter-spacing:-.02em}
.hdr-firm{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.hdr-pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:9px;padding:2px 7px;border:1px solid var(--border2);border-radius:3px;color:var(--text3)}
.sec-btn{font-family:var(--mono);font-size:10px;color:var(--text3);border:1px solid var(--border2);border-radius:5px;padding:5px 11px;text-decoration:none;transition:all .15s}
.sec-btn:hover{color:var(--accent);border-color:var(--accent)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
.kpi{padding:14px 16px;border-right:1px solid var(--border)}
.kpi:last-child{border-right:none}
.kpi-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text)}
.kpi-val.green{color:var(--buy)}
.kpi-val.red{color:var(--sell)}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px}
.q-nav{display:flex;gap:6px;padding:10px 0 0;border-top:1px solid var(--border);overflow-x:auto}
.q-nav::-webkit-scrollbar{display:none}
.q-btn{font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.q-btn:hover{border-color:var(--accent);color:var(--accent)}
.q-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600}
.tabs{display:flex;border-top:1px solid var(--border)}
.tab{font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:28px 32px}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.f-btn{font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.f-btn:hover{color:var(--text2)}
.f-btn.f-all{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.f-btn.f-new{background:rgba(167,139,250,.12);color:var(--new);border-color:rgba(167,139,250,.3)}
.f-btn.f-added{background:rgba(0,212,170,.1);color:var(--buy);border-color:rgba(0,212,170,.25)}
.f-btn.f-reduced{background:rgba(255,71,87,.08);color:var(--sell);border-color:rgba(255,71,87,.2)}
.f-btn.f-unchanged{background:rgba(74,85,104,.12);color:var(--text3);border-color:rgba(74,85,104,.25)}
.f-cnt{opacity:.6;font-size:9px;margin-left:3px}
.tbl-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
thead{background:var(--surface2);border-bottom:1px solid var(--border2)}
th{padding:10px 14px;text-align:left;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);cursor:pointer;user-select:none;transition:color .15s;white-space:nowrap}
th:hover{color:var(--text2)}
th.sorted{color:var(--accent)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
.stock-cell{display:flex;align-items:center;gap:8px}
.s-logo{width:20px;height:20px;border-radius:5px;object-fit:contain;background:var(--surface2);flex-shrink:0}
.s-name{font-weight:500;font-size:12px}
.s-cusip{font-size:10px;color:var(--text3);margin-top:1px}
.bar-bg{background:var(--surface2);border-radius:2px;height:3px;width:72px}
.bar-fill{height:3px;border-radius:2px;background:var(--accent)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.b-new{background:rgba(167,139,250,.12);color:var(--new);border:1px solid rgba(167,139,250,.25)}
.b-added{background:rgba(0,212,170,.1);color:var(--buy);border:1px solid rgba(0,212,170,.2)}
.b-reduced{background:rgba(255,71,87,.08);color:var(--sell);border:1px solid rgba(255,71,87,.18)}
.b-unchanged{background:rgba(74,85,104,.1);color:var(--text3);border:1px solid rgba(74,85,104,.2)}
.moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.move-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.move-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.move-title{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.move-title.c-new{color:var(--new)}
.move-title.c-sell{color:var(--sell)}
.move-title.c-buy{color:var(--buy)}
.move-cnt{font-family:var(--mono);font-size:10px;color:var(--text3)}
.move-row{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.move-row:last-child{border-bottom:none}
.move-row:hover{background:rgba(255,255,255,.02)}
.move-l{display:flex;align-items:center;gap:8px}
.move-n{font-size:12px;font-weight:500}
.move-s{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:1px}
.move-r{text-align:right}
.move-v{font-family:var(--mono);font-size:12px}
.move-d{font-family:var(--mono);font-size:10px;margin-top:1px}
.move-d.pos{color:var(--buy)}
.move-d.neg{color:var(--sell)}
.move-d.neu{color:var(--new)}
.no-move{padding:20px 16px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)}
.load-prev{display:flex;align-items:center;gap:8px;padding:16px;font-family:var(--mono);font-size:10px;color:var(--text3);justify-content:center}
.spin-sm{width:12px;height:12px;border:1px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.fade{animation:fi .22s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:860px){.app{grid-template-columns:1fr;height:auto}.sidebar{height:220px}.moves-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.inv-hdr{padding:16px 16px 0}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sb-top">
    <div class="sb-logo"><div class="sb-dot"></div>SuperInvestors 13F</div>
    <div class="sb-label">Institutional Managers</div>
    <input class="sb-search" id="searchBox" type="text" placeholder="Cerca investitore...">
  </div>
  <div class="sb-list" id="sbList"></div>
</aside>
<main class="main" id="main">
  <div class="centered">
    <div style="font-size:40px;opacity:.2">◈</div>
    <div>Seleziona un investitore</div>
    <div style="font-size:10px;color:var(--text3)">Dati live da SEC EDGAR 13F-HR</div>
  </div>
</main>
</div>
<script>
const INVESTORS=[
  {name:"Warren Buffett",firm:"Berkshire Hathaway",cik:"0001067983",style:"Value"},
  {name:"Bill Ackman",firm:"Pershing Square",cik:"0001336528",style:"Activist"},
  {name:"Seth Klarman",firm:"Baupost Group",cik:"0001061768",style:"Value"},
  {name:"Stanley Druckenmiller",firm:"Duquesne Family Office",cik:"0001536411",style:"Macro"},
  {name:"Michael Burry",firm:"Scion Asset Mgmt",cik:"0001649339",style:"Contrarian"},
  {name:"George Soros",firm:"Soros Fund Management",cik:"0001029160",style:"Macro"},
  {name:"Ken Griffin",firm:"Citadel Advisors",cik:"0001423053",style:"Quant"},
  {name:"David Tepper",firm:"Appaloosa Mgmt",cik:"0001656456",style:"Macro/Value"},
  {name:"Steve Cohen",firm:"Point72 Asset Mgmt",cik:"0001603466",style:"Multi-Strat"},
  {name:"Ray Dalio",firm:"Bridgewater Associates",cik:"0001350694",style:"Macro"},
  {name:"Carl Icahn",firm:"Icahn Capital Mgmt",cik:"0000921669",style:"Activist"},
  {name:"Israel Englander",firm:"Millennium Management",cik:"0001273087",style:"Multi-Strat"},
  {name:"John Paulson",firm:"Paulson & Co.",cik:"0001035674",style:"Event-Driven"},
  {name:"Dan Loeb",firm:"Third Point",cik:"0001040273",style:"Activist"},
  {name:"David Einhorn",firm:"Greenlight Capital",cik:"0001079114",style:"Value/Short"},
  {name:"Chase Coleman",firm:"Tiger Global Mgmt",cik:"0001167483",style:"Growth/Tech"},
  {name:"Philippe Laffont",firm:"Coatue Management",cik:"0001135730",style:"Tech/Growth"},
];
let INV=null,FILINGS=[],HOLDINGS={};
let fidx=0,tab='portfolio',filt='all',sortK='value',sortD='desc';
const $=id=>document.getElementById(id);
const money=v=>{if(!v&&v!==0)return'—';if(v>=1e9)return`$${(v/1e9).toFixed(2)}B`;if(v>=1e6)return`$${(v/1e6).toFixed(1)}M`;if(v>=1e3)return`$${(v/1e3).toFixed(0)}K`;return`$${v}`;};
const shs=v=>{if(!v&&v!==0)return'—';if(v>=1e6)return`${(v/1e6).toFixed(2)}M`;if(v>=1e3)return`${(v/1e3).toFixed(1)}K`;return`${v}`;};
const pct=v=>v==null?'—':`${v>0?'+':''}${v.toFixed(1)}%`;
const cikN=c=>c.replace(/^0+/,'');
const fmtA=a=>a.replace(/-/g,'');
const getQ=p=>{if(!p)return'?';const m=parseInt(p.substring(5,7));if(m<=3)return 1;if(m<=6)return 2;if(m<=9)return 3;return 4;};
const sec=(url,m='GET')=>fetch(`/api/sec?url=${encodeURIComponent(url)}`,{method:m});
const LOGOS={'APPLE':'apple.com','MICROSOFT':'microsoft.com','AMAZON':'amazon.com','AMAZON COM':'amazon.com','ALPHABET':'google.com','GOOGLE':'google.com','META PLATFORMS':'meta.com','NVIDIA':'nvidia.com','TESLA':'tesla.com','BERKSHIRE':'berkshirehathaway.com','JPMORGAN':'jpmorganchase.com','BANK OF AMERICA':'bankofamerica.com','WELLS FARGO':'wellsfargo.com','GOLDMAN':'goldmansachs.com','VISA':'visa.com','MASTERCARD':'mastercard.com','PAYPAL':'paypal.com','NETFLIX':'netflix.com','DISNEY':'disney.com','UBER':'uber.com','AIRBNB':'airbnb.com','SALESFORCE':'salesforce.com','ORACLE':'oracle.com','INTEL':'intel.com','EXXON':'exxonmobil.com','CHEVRON':'chevron.com','COCA-COLA':'coca-cola.com','COCA COLA':'coca-cola.com','JOHNSON':'jnj.com','PFIZER':'pfizer.com','UNITEDHEALTH':'unitedhealthgroup.com','HOME DEPOT':'homedepot.com','WALMART':'walmart.com','COSTCO':'costco.com','ALIBABA':'alibaba.com','BROOKFIELD':'brookfield.com','HILTON':'hilton.com','RESTAURANT BRANDS':'rbi.com','CITIGROUP':'citi.com','MORGAN STANLEY':'morganstanley.com','BLACKROCK':'blackrock.com','VERIZON':'verizon.com','ADOBE':'adobe.com','AMERICAN EXPRESS':'americanexpress.com','DAVITA':'davita.com','CHARTER COMM':'charter.com'};
function getLogo(name){const u=name.toUpperCase();for(const[k,v]of Object.entries(LOGOS))if(u.includes(k))return`/api/logo?domain=${v}`;return null;}
function logoImg(name,sz=20){const l=getLogo(name);const r=Math.round(sz*.25);return l?`<img style="width:${sz}px;height:${sz}px;border-radius:${r}px;object-fit:contain;background:var(--surface2);flex-shrink:0" src="${l}" onerror="this.style.display='none'" loading="lazy">`:`<div style="width:${sz}px;height:${sz}px;border-radius:${r}px;background:var(--surface2);flex-shrink:0"></div>`;}
function renderSB(f=''){
  $('sbList').innerHTML=INVESTORS.filter(i=>i.name.toLowerCase().includes(f.toLowerCase())||i.firm.toLowerCase().includes(f.toLowerCase())).map(i=>`
    <div class="inv-item ${INV?.cik===i.cik?'active':''}" onclick="pick('${i.cik}')">
      <div class="inv-name">${i.name}</div>
      <div class="inv-firm">${i.firm}</div>
      <div class="inv-meta"><div class="inv-tag">CIK <span>${cikN(i.cik)}</span></div><div class="inv-tag">Style <span>${i.style}</span></div></div>
    </div>`).join('');
}
async function pick(cik){
  INV=INVESTORS.find(i=>i.cik===cik);fidx=0;FILINGS=[];HOLDINGS={};tab='portfolio';filt='all';
  renderSB($('searchBox').value);
  $('main').innerHTML=`<div class="centered"><div class="spinner"></div><div>Caricamento ${INV.name}...</div></div>`;
  await loadFilings(cik);
}
async function loadFilings(cik){
  try{
    const pk='CIK'+cik.replace(/^0+/,'').padStart(10,'0');
    const r=await sec(`https://data.sec.gov/submissions/${pk}.json`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    const forms=d.filings?.recent?.form||[],acc=d.filings?.recent?.accessionNumber||[];
    const dates=d.filings?.recent?.filingDate||[],periods=d.filings?.recent?.reportDate||[];
    const f13=[];for(let i=0;i<forms.length;i++)if(forms[i]==='13F-HR')f13.push({acc:acc[i],date:dates[i],period:periods[i]||dates[i]});
    if(!f13.length){showErr('Nessun filing 13F-HR trovato.',cik);return;}
    FILINGS=f13.slice(0,8);await loadH(cik,0);
  }catch(e){showErr(e.message,cik);}
}
async function loadH(cik,idx){
  $('main').innerHTML=`<div class="centered"><div class="spinner"></div><div>Download holdings...</div></div>`;
  const f=FILINGS[idx];
  if(HOLDINGS[f.acc]){fidx=idx;render(cik,idx);return;}
  try{
    const ca=fmtA(f.acc),ci=cikN(cik);
    const xu=await findXml(ci,ca,f.acc);
    const xr=await sec(xu);if(!xr.ok)throw new Error(`HTTP ${xr.status}`);
    const xt=await xr.text();
    const h=parseXml(xt);if(!h.length)throw new Error('Nessun holding (formato non supportato)');
    HOLDINGS[f.acc]=h;fidx=idx;render(cik,idx);
    if(idx===0&&FILINGS[1]&&!HOLDINGS[FILINGS[1].acc]){
      const pf=FILINGS[1],pca=fmtA(pf.acc),cap=cik;
      findXml(cikN(cik),pca,pf.acc).then(u=>sec(u)).then(r=>r.text()).then(t=>{
        const ph=parseXml(t);if(ph.length){HOLDINGS[pf.acc]=ph;if(INV?.cik===cap&&fidx===0)render(cap,0);}
      }).catch(()=>{});
    }
  }catch(e){showErr(e.message,cik);}
}
function showErr(msg,cik){$('main').innerHTML=`<div class="error-box">⚠ Errore SEC EDGAR:<br><br>${msg}<br><br><a href="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cikN(cik)}&type=13F-HR" target="_blank" style="color:var(--accent2)">Apri su SEC EDGAR ↗</a></div>`;}
async function findXml(ci,ca,acc){
  const base=`https://www.sec.gov/Archives/edgar/data/${ci}/${ca}`;
  try{
    const r=await sec(`${base}/${acc}-index.htm`);
    if(r.ok){
      const html=await r.text();
      const rows=[...html.matchAll(/<tr[^>]*>[\s\S]*?<\/tr>/gi)];
      for(const row of rows){if(/INFORMATION TABLE/i.test(row[0])){const m=row[0].match(/href="([^"]+\.xml)"/i);if(m)return`${base}/${m[1].split('/').pop()}`;}}
      const allXml=[...html.matchAll(/href="([^"]*\.xml)"/gi)];
      const infoXml=allXml.find(m=>!/primary/i.test(m[1]));
      if(infoXml)return`${base}/${infoXml[1].split('/').pop()}`;
      if(allXml.length)return`${base}/${allXml[allXml.length-1][1].split('/').pop()}`;
    }
  }catch{}
  try{
    const r=await sec(`${base}/${acc}-index.json`);
    if(r.ok){const d=await r.json();const it=d.directory?.item||[];let f=it.find(x=>x.type==='INFORMATION TABLE');if(!f)f=it.find(x=>x.name?.toLowerCase().endsWith('.xml')&&!x.name.toLowerCase().includes('primary'));if(f?.name)return`${base}/${f.name}`;}
  }catch{}
  for(const n of['infotable.xml','form13fInfoTable.xml','informationtable.xml','InfoTable.xml','xslForm13F_X02.xml']){try{const r=await sec(`${base}/${n}`,'HEAD');if(r.ok)return`${base}/${n}`;}catch{}}
  return`${base}/${acc}.txt`;
}
function parseXml(raw){
  let x=raw;
  if(raw.includes('<SEQUENCE>')||raw.includes('-----BEGIN PRIVACY')){const m=raw.match(/<informationTable[\s\S]*?<\/informationTable>/i)||raw.match(/<infoTable[\s\S]*?<\/infoTable>/i);if(m)x=m[0];else{const s=[...raw.matchAll(/<\?xml/gi)].map(a=>a.index);if(s.length)x=raw.substring(s.length>1?s[s.length-1]:s[0]);}}
  const c=x.replace(/<\?xml[^>]*\?>/g,'').replace(/\s+xmlns(?::[a-zA-Z0-9_]+)?="[^"]*"/g,'').replace(/\s+xsi:[a-zA-Z:]+="[^"]*"/g,'').replace(/<([a-zA-Z0-9_]+):/g,'<').replace(/<\/([a-zA-Z0-9_]+):/g,'</');
  const doc=new DOMParser().parseFromString(c,'text/xml');
  const entries=doc.querySelectorAll('infoTable');if(!entries.length)return[];
  const h=[];entries.forEach(e=>{const g=t=>e.querySelector(t)?.textContent?.trim()||'';const name=g('nameOfIssuer'),cusip=g('cusip'),value=parseInt(g('value')||'0',10)*1000,shares=parseInt(g('sshPrnamt')||'0',10),type=g('sshPrnamtType')||'SH';if(name&&value>0)h.push({name,cusip,value,shares,type});});
  return h.sort((a,b)=>b.value-a.value);
}
function getMoves(curr,prev){
  if(!prev||!prev.length)return null;
  const pm={},cm={};prev.forEach(h=>{pm[h.cusip||h.name]=h;});curr.forEach(h=>{cm[h.cusip||h.name]=h;});
  const newP=curr.filter(h=>!pm[h.cusip||h.name]);
  const closed=prev.filter(h=>!cm[h.cusip||h.name]);
  const changed=curr.filter(h=>{const p=pm[h.cusip||h.name];return p&&h.shares!==p.shares;});
  const inc=changed.filter(h=>h.shares>pm[h.cusip||h.name].shares).map(h=>({...h,prevS:pm[h.cusip||h.name].shares}));
  const red=changed.filter(h=>h.shares<pm[h.cusip||h.name].shares).map(h=>({...h,prevS:pm[h.cusip||h.name].shares}));
  return{newP,closed,inc,red};
}
function ct(h,pm){if(!pm)return'new';const k=h.cusip||h.name;if(!pm[k])return'new';if(h.shares>pm[k].shares)return'inc';if(h.shares<pm[k].shares)return'red';return'unch';}
function render(cik,idx){
  const inv=INV,f=FILINGS[idx],h=HOLDINGS[f.acc];
  const total=h.reduce((s,x)=>s+x.value,0);
  const prevF=FILINGS[idx+1],prevH=prevF?HOLDINGS[prevF.acc]:null;
  const mv=getMoves(h,prevH);
  const pm=prevH?Object.fromEntries(prevH.map(x=>[x.cusip||x.name,x])):null;
  const enr=h.map(x=>({...x,weight:total>0?(x.value/total*100):0,ct_:ct(x,pm),prevS:pm?.[x.cusip||x.name]?.shares||0}));
  const newCnt=enr.filter(x=>x.ct_==='new').length;
  const exitCnt=mv?.closed?.length||0;
  const mvTot=mv?(mv.newP.length+mv.closed.length+mv.inc.length+mv.red.length):0;
  const counts={all:enr.length,new:newCnt,added:enr.filter(x=>x.ct_==='inc').length,reduced:enr.filter(x=>x.ct_==='red').length,unchanged:enr.filter(x=>x.ct_==='unch').length};
  $('main').innerHTML=`<div class="fade">
    <div class="inv-hdr">
      <div class="hdr-top">
        <div>
          <div class="hdr-name">${inv.name}</div>
          <div class="hdr-firm">${inv.firm}</div>
          <div class="hdr-pills">
            <span class="pill">Q${getQ(f.period)} ${f.period?.substring(0,4)||''}</span>
            <span class="pill">Filed: ${f.date}</span>
            <span class="pill">CIK: ${cikN(cik)}</span>
            <span class="pill">${inv.style}</span>
          </div>
        </div>
        <a href="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cikN(cik)}&type=13F-HR" target="_blank" class="sec-btn">SEC EDGAR ↗</a>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Portfolio Value</div><div class="kpi-val">${money(total)}</div><div class="kpi-sub">${h.length} posizioni</div></div>
        <div class="kpi"><div class="kpi-label">Top Holding</div><div class="kpi-val" style="font-size:14px">${enr[0]?.name?.substring(0,16)||'—'}</div><div class="kpi-sub">${enr[0]?.weight?.toFixed(1)}%</div></div>
        <div class="kpi"><div class="kpi-label">New Entries</div><div class="kpi-val ${newCnt>0?'green':''}">${prevH?newCnt:'—'}</div><div class="kpi-sub">nuove posizioni</div></div>
        <div class="kpi"><div class="kpi-label">Full Exits</div><div class="kpi-val ${exitCnt>0?'red':''}">${prevH?exitCnt:'—'}</div><div class="kpi-sub">posizioni chiuse</div></div>
      </div>
      <div class="q-nav">${FILINGS.map((qf,i)=>`<button class="q-btn ${i===idx?'active':''}" onclick="go(${i})">Q${getQ(qf.period)} ${qf.period?.substring(0,4)||''}</button>`).join('')}</div>
      <div class="tabs">
        <div class="tab ${tab==='portfolio'?'active':''}" onclick="swTab('portfolio','${cik}',${idx})">Portfolio</div>
        <div class="tab ${tab==='moves'?'active':''}" onclick="swTab('moves','${cik}',${idx})">Movimenti${mv?` (${mvTot})`:''}</div>
      </div>
    </div>
    <div class="content">${tab==='portfolio'?renderPortfolio(enr,total,counts):renderMoves(mv,prevH)}</div>
  </div>`;
}
function renderPortfolio(enr,total,counts){
  let fl=enr;
  if(filt==='new')fl=enr.filter(h=>h.ct_==='new');
  else if(filt==='added')fl=enr.filter(h=>h.ct_==='inc');
  else if(filt==='reduced')fl=enr.filter(h=>h.ct_==='red');
  else if(filt==='unchanged')fl=enr.filter(h=>h.ct_==='unch');
  const sorted=[...fl].sort((a,b)=>{const av=a[sortK]??0,bv=b[sortK]??0;return sortD==='desc'?bv-av:av-bv;});
  const maxV=enr[0]?.value||1;
  const si=k=>`<span style="opacity:.5;font-size:9px">${sortK===k?(sortD==='desc'?'↓':'↑'):'↕'}</span>`;
  return`<div class="filter-bar">${[['all','f-all',counts.all],['new','f-new',counts.new],['added','f-added',counts.added],['reduced','f-reduced',counts.reduced],['unchanged','f-unchanged',counts.unchanged]].map(([k,cls,cnt])=>`<button class="f-btn ${filt===k?cls:''}" onclick="setF('${k}')">${k.charAt(0).toUpperCase()+k.slice(1)}<span class="f-cnt">${cnt}</span></button>`).join('')}</div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>#</th><th>Emittente</th><th onclick="srt('value')" class="${sortK==='value'?'sorted':''}">Value ${si('value')}</th><th onclick="srt('shares')" class="${sortK==='shares'?'sorted':''}">Shares ${si('shares')}</th><th onclick="srt('weight')" class="${sortK==='weight'?'sorted':''}">Weight ${si('weight')}</th><th>Bar</th><th>Var. QoQ</th><th>Tipo</th></tr></thead>
    <tbody>${sorted.map((h,i)=>{const chg=h.prevS>0?((h.shares-h.prevS)/h.prevS*100):null;return`<tr><td style="color:var(--text3);font-size:10px">${i+1}</td><td><div class="stock-cell">${logoImg(h.name)}<div><div class="s-name">${h.name}</div>${h.cusip?`<div class="s-cusip">${h.cusip}</div>`:''}</div></div></td><td style="font-weight:500">${money(h.value)}</td><td>${shs(h.shares)}</td><td>${h.weight.toFixed(2)}%</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(h.value/maxV*72)}px"></div></div></td><td>${badge(h.ct_,chg)}</td><td style="color:var(--text3);font-size:10px">${h.type||'SH'}</td></tr>`;}).join('')}</tbody>
  </table></div>`;
}
function renderMoves(mv,prevH){
  if(!prevH)return`<div class="load-prev"><div class="spin-sm"></div>Caricamento trimestre precedente...</div>`;
  if(!mv)return`<div style="padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)">Nessun dato.</div>`;
  const mrow=(h,type)=>{const chg=h.prevS>0?((h.shares-h.prevS)/h.prevS*100):null;const delta=type==='new'?`<div class="move-d neu">New</div>`:type==='closed'?`<div class="move-d neg">Exit</div>`:type==='inc'?`<div class="move-d pos">▲ ${chg!=null?Math.abs(chg).toFixed(1)+'%':''}</div>`:`<div class="move-d neg">▼ ${chg!=null?Math.abs(chg).toFixed(1)+'%':''}</div>`;const sub=type==='inc'||type==='red'?`${shs(h.prevS)} → ${shs(h.shares)} sh`:`${shs(h.shares)} sh`;return`<div class="move-row"><div class="move-l">${logoImg(h.name,24)}<div><div class="move-n">${h.name.substring(0,22)}</div><div class="move-s">${sub}</div></div></div><div class="move-r"><div class="move-v">${money(h.value)}</div>${delta}</div></div>`;};
  const card=(title,cls,items,type)=>`<div class="move-card"><div class="move-hdr"><div class="move-title ${cls}">${title}</div><div class="move-cnt">${items.length}</div></div>${items.length?items.slice(0,12).map(h=>mrow(h,type)).join(''):'<div class="no-move">Nessun movimento</div>'}</div>`;
  return`<div class="moves-grid">${card('✦ Nuove','c-new',mv.newP,'new')}${card('✕ Chiuse','c-sell',mv.closed,'closed')}${card('▲ Aumentate','c-buy',mv.inc,'inc')}${card('▼ Ridotte','c-sell',mv.red,'red')}</div>`;
}
function badge(ct_,chg){if(ct_==='new')return`<span class="badge b-new">✦ New</span>`;if(ct_==='inc')return`<span class="badge b-added">▲ ${chg!=null?pct(chg):'Added'}</span>`;if(ct_==='red')return`<span class="badge b-reduced">▼ ${chg!=null?pct(chg):'Reduced'}</span>`;return`<span class="badge b-unchanged">—</span>`;}
function swTab(t,cik,idx){tab=t;render(cik,idx);}
function setF(f){filt=f;render(INV.cik,fidx);}
function srt(k){if(sortK===k)sortD=sortD==='desc'?'asc':'desc';else{sortK=k;sortD='desc';}render(INV.cik,fidx);}
async function go(idx){tab='portfolio';filt='all';await loadH(INV.cik,idx);}
$('searchBox').addEventListener('input',e=>renderSB(e.target.value));
renderSB();
</script>
</body>
</html>
